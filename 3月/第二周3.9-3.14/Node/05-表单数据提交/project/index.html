<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单</title>
    <style>
        * { margin: 0;
            padding: 0;
            box-sizing: border-box; 
        }
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #333; 
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #555; 
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #5a67d8; }
        .response {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            display: none;
        }
        .success { border-left: 4px solid #48bb78; }
    </style>
</head>
<body>
    <div class="container">
        <h1>入学信息</h1>
        <form action="http://localhost:3000/api/submit-form"
            method="POST" onsubmit="showLoading(event)">

            <!-- name -->
            <div class="form-group">
                <label for="username">姓名：</label>
                <input type="text" id="username" name="username"
                    placeholder="请输入姓名" required>
            </div>
            
            <!-- age -->
            <div class="form-group">
                <label for="age">年龄：</label>
                <input 
                    type="number"
                    id="age"
                    name="age"
                    min="1"
                    max="120"
                    placeholder="请输入年龄"
                >
            </div>
            
            <!-- sex -->
            <div class="form-group">
                <label for="gender">性别：</label>
                <select id="gender" name="gender">
                    <option value="">请选择性别</option>
                    <option value="male">男</option>
                    <option value="female">女</option>
                    <option value="other">其他</option>
                </select>
            </div>
            
            <!-- 提交按钮 -->
            <button type="submit">提交表单</button>
        </form>
        <div id="response" class="response"></div>
    </div>

    <script>
        // 提交时状态变化
        function showLoading(event) {
            // event.target：触发事件的元素，这里是表单元素
            const btn = event.target.querySelector('button[type="submit"]');
            btn.innerHTML = '提交中...请勿重复点击';
            btn.disabled = true;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            // window.location.search：获取URL中?后面的字符串
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.has('success')) {
                // 如果有success参数，表示提交成功
                const responseDiv = document.getElementById('response');
                responseDiv.style.display = 'block';
                responseDiv.innerHTML = `
                    <h3>提交成功！</h3>
                    <p>已收到您的表单数据，请查看后端控制台输出。</p>
                `;
            }
        });
    </script>
</body>
</html>
