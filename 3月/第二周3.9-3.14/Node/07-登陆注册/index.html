<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册页面</title>
    <style>
        *{
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        body{
            padding: 20px;
            background-color: aliceblue;
        }
        .container{
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0px 10px rgba(0,0,0,0.1);
        }
        h1{
            text-align:center;
        }
        .tabs{
            display: flex;
            margin-top: 10px;
            border-bottom: 2px solid transparent;
        }
        .tab{
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-bottom:2px solid transparent;
        }
        .tab.active{
            border-bottom:2px solid green;
        }
        form{
            display: none;
        }
        form.active{
            display: block;
        }
        input{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
        }
        button{
            width: 100%;
            padding: 12px;
            background-color: rgb(13, 182, 87);
            color: white;
            font-size: 15px;
            margin-top: 10px;
            /* display: none; */
        }
        button:hover{
            background-color: rgba(13, 182, 87,0.5);
        }
        .msg{
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }

        .success { 
            background-color: #d4edda; 
            color: #155724; 
            border: 1px solid #c3e6cb;
        }
        .error { 
            background-color: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb;
        }


    </style>
</head>
<body>
    <div class="container">
        <h1>登录注册</h1>

        <div class="tabs">
            <div class="tab active" onclick="showForm('login')">登录</div>
            <div class="tab" onclick="showForm('register')">注册</div>
        </div>

        <!-- 登录 -->
        <form id="loginForm" class="active">
            <input type="text" id="loginUsername" placeholder="用户名" required>
            <input type="password" id="loginPwd" placeholder="密码" required>
            <button type="button" onclick="login()">登录</button>
            <div id="loginMsg" class="msg"></div>
        </form>

        <!-- 注册 -->
        <form id="registerForm">
            <input type="text" id="registerUsername" placeholder="用户名" required>
            <input type="password" id="registerPwd" placeholder="密码" required>
            <button type="button" onclick="register()">注册</button>
            <div id="registerMsg" class="msg"></div>
        </form>
    </div>
    <script>
        // 注册
        async function register() {
            const username=document.getElementById('registerUsername').value;
            const pwd=document.getElementById('registerPwd').value;
            const msg_last=document.getElementById('registerMsg');

            // 发送注册请求
            const response = await fetch('http://localhost:3000/api/register',{
                method:"POST",
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username,pwd:pwd})
            });

            //data存的是后端发过来的数据
            const data = await response.json();
            msg_last.textContent = data.msg;
            msg_last.className = data.success?'success':'error';
            msg_last.style.display = 'block';

            // 注册成功清空表单数据
            if(data.success){
                document.getElementById('registerUsername').value = '';
                document.getElementById('registerPwd').value = '';
            }
        }

        // 登录
        async function login() {
            const username=document.getElementById('loginUsername').value;
            const pwd=document.getElementById('loginPwd').value;
            const msg_last=document.getElementById('loginMsg');

            // 发送登录请求
            const response = await fetch('http://localhost:3000/api/login',{
                method:"POST",
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username,pwd:pwd})
            });

            //data存的是后端发过来的数据
            const data = await response.json();
            msg_last.textContent = data.msg;
            msg_last.className = data.success?'success':'error';
            msg_last.style.display = 'block';

            // 登录成功保存数据到token
            if(data.success){
                localStorage.setItem('token',data.token);
                localStorage.setItem('user',JSON.stringify(data.user));
            }
        }

        // 选择其中一个表单，选中的处于active状态，另一个就移除actiev类
        // 这里是顶部状态的显示
        function showForm(formType){
            // 先把全部的active状态移除
            document.querySelectorAll('.tab').forEach(
                tab=>{
                    tab.classList.remove('active');
                }
            )

            document.querySelectorAll('form').forEach(
                form=>{
                    form.classList.remove('active');
                }
            )

            // 判断表单选的是哪一个
            if(formType==='login'){
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            }else{
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
    </script>
</body>
</html>
