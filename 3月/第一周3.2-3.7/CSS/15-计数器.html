<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            counter-reset: numH1;
            /* display: flex;
            justify-content: center;
            align-items: center; */
            text-align: center;
        }
        /* 遇见h1就递增 */
        h1{
            counter-increment: numH1;
            display: block;
            flex-direction: column;
        }
        /* 如何显示 */
        h1::before{
            content: "第" counter(numH1) "章:";
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>HTML</h1>
    <h1>CSS</h1>
    <h1>JS</h1>
</body>
</html>
