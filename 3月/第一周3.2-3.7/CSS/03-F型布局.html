<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F型布局实现</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        
        .all {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }
        
        .head {
            display: flex;
            background-color: rgb(37, 37, 90);
            color: white;
            height: 8vh;
            width: 100vw;
            padding: 1vh;
            justify-content: space-between;
            align-items: center; /* 添加垂直居中 */
        }
        
        .logo {
            font-weight: bold;
            font-size: 30px;
        }
        
        .nav {
            display: flex;
            gap: 3vw; /* 调整间距 */
            font-size: 20px;
            font-weight: bold;
        }
        
        /* 主要内容容器 - 修复这里 */
        .content-container {
            display: flex;
            flex: 1; /* 占据剩余空间 */
            width: 100%;
        }
        
        .side {
            background-color: rgb(44, 44, 113);
            width: 200px;
            padding: 20px;
        }
        
        .main {
            background-color: white;
            flex: 1; /* 占据剩余宽度 */
            display: flex;
            flex-direction: column; /* 改为垂直排列 */
            padding: 20px;
        }
        
        .main-up {
            background-color: aquamarine;
            height: 40%; /* 占main的40%高度 */
            width: 100%;
            margin-bottom: 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-weight: bold;
            font-size: 24px;
        }
        
        .main-down {
            background-color: lightcoral;
            height: 60%; /* 占main的60%高度 */
            width: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-weight: bold;
            font-size: 24px;
        }
        
        .foot {
            width: 100vw;
            height: 9vh;
            background-color: rgb(37, 37, 90);
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 可选：添加一些内容占位符 */
        .placeholder {
            text-align: center;
            padding: 20px;
        }
        
        .placeholder h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="all">
        <header class="head">
            <div class="logo">Logo</div>
            <div class="nav">
                <div>产品</div>
                <div>首页</div>
                <div>关于</div>
            </div>
        </header>
        
        <!-- 修复：使用单一容器包裹aside和main -->
        <div class="content-container">
            <aside class="side">
                <div class="placeholder">
                    <h2>侧边栏</h2>
                    <p>导航菜单</p>
                    <p>用户信息</p>
                    <p>设置</p>
                </div>
            </aside>
            
            <main class="main">
                <div class="main-up">
                    <h2>主内容区域 - 上部</h2>
                </div>
                <div class="main-down">
                    <h2>主内容区域 - 下部</h2>
                </div>
            </main>
        </div>
        
        <footer class="foot">
            <div>@ 2026 Flex-F HappyDog</div>
        </footer>
    </div>
</body>
</html>
