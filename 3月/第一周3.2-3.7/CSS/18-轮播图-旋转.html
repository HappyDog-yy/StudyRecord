<!-- 旋转样式 -->
<!-- 纯CSS实现和JS辅助实现 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            box-sizing: border-box;
            padding: 0;
        }
        body{
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: rgb(41, 26, 101);
            /* 此属性用于设置观察者的视距，3D透视效果的关键 */
            /* perspective: 1000px; */
            /* 使用视口宽度作为透视单位 */
            /* 一边添加响应式效果 */
            perspective: 100vw;
        }
        /* 放轮播图的容器 */
        .container{
            width: 100vw;
            height: 80vh;
            max-width: 500px;
            min-width: 250px;
            max-height: 500px;
            min-height: 250px;
            position: relative;
            /* 保持子元素的3d效果 */
            transform-style: preserve-3d;
            animation: DH 20s infinite linear;
            /* 动画效果为DH，20s时间，无线次循环 */
        }
        /* 定义动画 */
        @keyframes DH{
            /* 刚开始和最后一帧的动画定义 */
            /* 一次动画为旋转一圈 */
            0%{transform: rotateY(0deg);}
            100%{transform: rotateY(360deg);}
        }
        /* 鼠标悬停时动画停止 */
        .container:hover{
            animation-play-state: paused;
        }
        /* 每一张图片单独的容器 */
        .item{
            position: absolute;
            width: 70%;
            height: 50%;
            top: 50%;
            left: 50%;
            /* 设置变换中心为图片容器的中心 */
            transform-origin: center center;
            overflow: hidden;
        }
        /* 对于每一张图片 */
        .item>img{
            width: 80%;
            height: 80%;
            /* 图片填充方式 */
            object-fit: cover;
            /* 保持图片比例，裁剪填充容器 */
        }

        /* 控制6张图片的初始环绕布局，仅角度即可
        .container>.item:nth-child(1){
            transform: translate(-50%,-50%) rotateY(0deg) translateZ(250px);
        }
        .container>.item:nth-child(2){
            transform: translate(-50%,-50%) rotateY(60deg) translateZ(250px);
        }
        .container>.item:nth-child(3){
            transform: translate(-50%,-50%) rotateY(120deg) translateZ(250px);
        }
        .container>.item:nth-child(4){
            transform: translate(-50%,-50%) rotateY(180deg) translateZ(250px);
        }
        .container>.item:nth-child(5){
            transform: translate(-50%,-50%) rotateY(240deg) translateZ(250px);
        }
        .container>.item:nth-child(6){
            transform: translate(-50%,-50%) rotateY(300deg) translateZ(250px);
        } */

        /* 响应式，将z轴平移变成视口单位35vw */
         /* 控制6张图片的初始环绕布局，仅角度即可 */
        .container>.item:nth-child(1){
            transform: translate(-50%,-50%) rotateY(0deg) translateZ(35vw);
        }
        .container>.item:nth-child(2){
            transform: translate(-50%,-50%) rotateY(60deg) translateZ(35vw);
        }
        .container>.item:nth-child(3){
            transform: translate(-50%,-50%) rotateY(120deg) translateZ(35vw);
        }
        .container>.item:nth-child(4){
            transform: translate(-50%,-50%) rotateY(180deg) translateZ(35vw);
        }
        .container>.item:nth-child(5){
            transform: translate(-50%,-50%) rotateY(240deg) translateZ(35vw);
        }
        .container>.item:nth-child(6){
            transform: translate(-50%,-50%) rotateY(300deg) translateZ(35vw);
        }

        .describe{
            position: absolute;
            top: 5vh;
            left: 50%;
            /* 水平居中的用意，不过仅实现了左边框的水平居中 */
            /* 在像x轴负方向移动50% */
            transform: translateX(-50%);
            text-align: center;

        }

        /* 移动端优化 */
        @media (max-width:480px){
            .container{
                animation-duration: 30s;
                /* 小屏幕上减慢旋转速度 */
            }
            .container:hover{
                /* 小屏幕上没有鼠标悬停，不需要停止 */
                animation-play-state: running;
            }
        }
        
    </style>
</head>
<body>
    <div class="describe">
        <h2>CSS旋转轮播图实现</h2>
        <p>鼠标悬停轮播图停止</p>
    </div>
    <div class="container">
        <div class="item">
            <img src="./img/1.jpg" alt="图片1">
        </div>
        <div class="item">
            <img src="./img/2.jpg" alt="图片2">
        </div>
        <div class="item">
            <img src="./img/4.jpg" alt="图片3">
        </div>
        <div class="item">
            <img src="./img/1.jpg" alt="图片1">
        </div>
        <div class="item">
            <img src="./img/2.jpg" alt="图片2">
        </div>
        <div class="item">
            <img src="./img/4.jpg" alt="图片3">
        </div>
    </div>
    
</body>
</html>
